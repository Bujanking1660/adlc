steps:
  # Step 1: Build Docker image menggunakan Dockerfile kita
  # NEXT_PUBLIC_* wajib di-pass saat build (bukan runtime) karena di-embed ke JS bundle
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$_NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - '-t'
      - '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

  # Step 2: Push image ke Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME/$_SERVICE_NAME:$COMMIT_SHA'

  # Step 3: Deploy ke Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE_NAME'
      - '--image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_DEPLOY_REGION'
      - '--platform=managed'
      - '--quiet'

images:
  - '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$_SERVICE_NAME/$_SERVICE_NAME:$COMMIT_SHA'

options:
  # Opsi (c): Menyelesaikan error "service_account requires logging config"
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

# Substitution defaults — override di Cloud Build Trigger settings
substitutions:
  _SERVICE_NAME: adlc-planner
  _DEPLOY_REGION: asia-southeast2
  _AR_HOSTNAME: asia-southeast2-docker.pkg.dev
  # _NEXT_PUBLIC_SUPABASE_URL   → set di Trigger → Substitution variables
  # _NEXT_PUBLIC_SUPABASE_ANON_KEY → set di Trigger → Substitution variables
